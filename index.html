<style>
:root{
  --azul:#003C88; --azul2:#0057A8; --cyan:#00A3D7; --tinta:#0B1B33;
  --bg:#F1F5FA; --papel:#fff; --linha:#E1E9F3; --muted:#5A6B82;
  --verde:#0A7B4F; --promo:#C2410C; --sombra:0 10px 30px rgba(0,40,95,.10);
  --r:16px;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--tinta);overflow-x:hidden;
  font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;-webkit-text-size-adjust:100%}
button,input{font:inherit;color:inherit}
.wrap{max-width:680px;margin:0 auto;padding:0 14px 96px}

.top{position:sticky;top:0;z-index:30;
  background:linear-gradient(135deg,#002A66,#0057A8 60%,#00A3D7);color:#fff}
.top-in{max-width:680px;margin:0 auto;padding:11px 14px}
.brand{display:flex;align-items:center;gap:11px}
.brand img{height:30px;width:auto;display:block}
.brand .div{width:1px;height:24px;background:rgba(255,255,255,.32)}
.brand .ti{font-size:13px;font-weight:700;letter-spacing:-.01em;opacity:.95}
.src{font-size:11px;margin-top:7px;opacity:.9;display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:#8CE0B0;display:inline-block}
.dot.demo{background:#FFD27A}

/* nav (voltar + trilha) */
.nav{position:sticky;top:62px;z-index:20;
  background:rgba(241,245,250,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--linha)}
.nav-in{max-width:680px;margin:0 auto;padding:9px 14px;display:flex;align-items:center;gap:11px}
.voltar{display:inline-flex;align-items:center;gap:6px;background:var(--azul);color:#fff;border:0;
  border-radius:999px;padding:9px 15px 9px 12px;font-size:14px;font-weight:800;cursor:pointer;flex:0 0 auto;white-space:nowrap}
.voltar:active{filter:brightness(.93)}
.trilha{font-size:12.5px;color:var(--muted);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trilha b{color:var(--azul)}

.screen{padding:20px 2px 6px}
.screen h2{font-size:19px;margin:0 0 4px;letter-spacing:-.02em}
.screen p.lead{margin:0 0 16px;color:var(--muted);font-size:13px}

.opts{display:grid;gap:11px}
.opt{display:flex;align-items:center;gap:14px;width:100%;text-align:left;cursor:pointer;
  background:var(--papel);border:1.5px solid var(--linha);border-radius:var(--r);
  padding:17px 16px;box-shadow:var(--sombra);transition:transform .06s,border-color .12s}
.opt:active{transform:scale(.99)}
.opt:hover{border-color:var(--cyan)}
.opt .ic{width:44px;height:44px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;
  background:#EAF2FB;color:var(--azul);font-weight:900;font-size:17px}
.opt .tx b{display:block;font-size:16px;letter-spacing:-.01em}
.opt .tx span{display:block;font-size:12px;color:var(--muted);margin-top:2px}
.opt .go{margin-left:auto;color:var(--cyan);font-size:22px;font-weight:700}
.opt.promo{border-color:#F4C79B;background:linear-gradient(180deg,#FFF7F0,#FFFFFF)}
.opt.promo .ic{background:#FDE7D3;color:var(--promo)}
.opt.promo .go{color:var(--promo)}
.opt.soon{opacity:.72}
.opt.soon .ic{background:#EEF1F5;color:#9AA7B8}
.opt.soon .go{color:#B9C4D2;font-size:11px;font-weight:800;letter-spacing:.04em}

.embreve{text-align:center;padding:38px 18px;color:var(--muted)}
.embreve .big{font-size:15px;font-weight:800;color:var(--tinta);margin-bottom:6px}

/* busca */
.inputs{position:sticky;top:110px;z-index:15;display:grid;grid-template-columns:1fr 112px;gap:8px;
  padding:10px 0 4px;background:linear-gradient(var(--bg),var(--bg) 78%,rgba(241,245,250,0))}
.inputs input{background:#fff;border:1.5px solid var(--linha);border-radius:12px;
  padding:0 13px;min-height:48px;font-size:16px;font-weight:600;outline:none;width:100%}
.inputs input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,163,215,.14)}
.inputs input::placeholder{color:#94A6BD;font-weight:500}

.hero{background:linear-gradient(135deg,#003C88,#0069B8);color:#fff;border-radius:var(--r);
  padding:15px 16px;margin:10px 0 4px;box-shadow:var(--sombra)}
.hero .lb{font-size:11px;text-transform:uppercase;letter-spacing:.08em;opacity:.85}
.hero .pr{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-top:3px}
.hero .pr .nm{font-size:16px;font-weight:800;line-height:1.15}
.hero .pr .vl{font-size:26px;font-weight:900;letter-spacing:-.02em;white-space:nowrap}
.hero .fx{font-size:12px;opacity:.9;margin-top:3px}
.hero .ipi{font-size:11px;opacity:.82;margin-top:2px}
.hero .acts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:13px}

.list{margin-top:12px;display:grid;gap:12px}
.card{background:var(--papel);border:1px solid var(--linha);border-radius:var(--r);
  padding:14px;box-shadow:var(--sombra)}
.card h3{margin:0;font-size:16px;letter-spacing:-.01em}
.card .cod{font-size:11.5px;color:var(--muted);margin-top:2px}
.badge{display:inline-block;background:#FEF0E6;color:var(--promo);font-size:10.5px;font-weight:800;
  border-radius:6px;padding:2px 7px;margin-left:6px;vertical-align:middle;text-transform:uppercase;letter-spacing:.03em}
.faixas{list-style:none;margin:11px 0 0;padding:0;border-top:1px dashed var(--linha)}
.faixas li{display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:8px 2px;border-bottom:1px solid #F0F4F9;font-size:14px}
.faixas li:last-child{border-bottom:0}
.faixas .vl{font-weight:800;white-space:nowrap}
.faixas li.hit{background:#EAF7F0;margin:0 -6px;padding-left:8px;padding-right:8px;border-radius:8px}
.faixas li.hit .vl{color:var(--verde)}
.ipinote{font-size:11px;color:var(--muted);margin-top:8px;font-style:italic}
.card.promo-camp{border-color:#F4C79B;background:linear-gradient(180deg,#FFF7F0,#FFFFFF)}
.promo-corpo{white-space:pre-wrap;font-size:13.5px;line-height:1.5;color:var(--tinta);margin-top:11px;padding-top:11px;border-top:1px dashed var(--linha)}
.btn-pedido{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;margin-top:11px;background:#EAF2FB;color:var(--azul);border:1px solid #CFE0F5;border-radius:12px;min-height:46px;padding:0 14px;font-weight:800;font-size:13.5px;cursor:pointer}
.btn-pedido .chev{transition:transform .15s}
.btn-pedido.open{background:var(--azul);color:#fff;border-color:var(--azul)}
.btn-pedido.open .chev{transform:rotate(90deg)}
.pedido-box{margin-top:9px;background:#F7FAFE;border:1px solid var(--linha);border-radius:12px;padding:12px}
.pedido-box .promo-corpo{margin-top:0;padding-top:0;border-top:0}
.pedido-box .mini{margin-top:10px}
.btn.mini{min-height:38px;font-size:12.5px}
.obs{font-size:11.5px;color:var(--muted);margin-top:7px;line-height:1.35}
.acts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}
.btn{border:0;border-radius:12px;min-height:46px;font-weight:800;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;transition:filter .1s}
.btn:active{filter:brightness(.94)}
.btn.copy{background:#EAF2FB;color:var(--azul)}
.btn.wa{background:#1FA855;color:#fff}
.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}

.foot{text-align:center;color:#9AABC0;font-size:11px;margin-top:22px;line-height:1.5}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);
  background:var(--tinta);color:#fff;padding:11px 18px;border-radius:999px;font-size:13px;font-weight:700;
  opacity:0;pointer-events:none;transition:.2s;z-index:50}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.hidden{display:none!important}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
.senha-overlay{position:fixed;inset:0;z-index:100;background:linear-gradient(135deg,#002A66,#0057A8 60%,#00A3D7);display:flex;align-items:center;justify-content:center;padding:24px}
.senha-box{width:100%;max-width:340px;text-align:center;color:#fff}
.senha-box img{height:40px;margin-bottom:18px}
.senha-box h2{margin:0 0 4px;font-size:20px;letter-spacing:-.02em}
.senha-box p{margin:0 0 18px;font-size:13px;opacity:.9}
.senha-box input{width:100%;min-height:52px;border-radius:14px;border:0;padding:0 16px;font-size:17px;font-weight:600;text-align:center;outline:none;margin-bottom:11px;box-sizing:border-box}
.senha-box button{width:100%;min-height:52px;border-radius:14px;border:0;background:#fff;color:var(--azul);font-weight:800;font-size:16px;cursor:pointer}
.senha-box button:active{filter:brightness(.95)}
.senha-erro{margin-top:12px;font-size:13px;font-weight:700;color:#FFD27A}
</style>
</head>

var $ = function(id){return document.getElementById(id);};
function brl(v){ if(v==null||v==="")return "—"; return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"}); }
function norm(s){ return String(s==null?"":s).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }
function plural(u){ if(!u)return ""; return u.slice(-1)==="s"?u:u+"s"; }
function pct(ipi){ if(!ipi)return ""; var v=(ipi*100).toFixed(2).replace(/\.?0+$/,''); return v.replace('.',',')+'%'; }
function rotulo(it){ if(it.tipo==="Acessório") return "unidade"; var f=String(it.faixa||"").trim(); if(f) return f+" "+plural(it.unidade); return "por "+it.unidade; }

/* ---------- fonte de dados ---------- */
function fonte(vivo,txt){ $("dot").className="dot"+(vivo?"":" demo"); $("srcTxt").textContent=txt; }
function carregar(){
  if(!CONFIG.URL || CONFIG.URL.indexOf("http")!==0){ fonte(false,"Modo demonstração — dados de exemplo"); gate(); return; }
  fonte(true,"Conectando…");
  var cb="__neoCB_"+Date.now(), done=false;
  var limpar=function(s){ try{delete window[cb];}catch(e){window[cb]=undefined;} if(s&&s.parentNode)s.parentNode.removeChild(s); };
  window[cb]=function(d){
    done=true;
    if(d&&d.itens&&d.itens.length){ DADOS=d;
      var ex=d.bloqueadosPorDivergencia?(" · "+d.bloqueadosPorDivergencia+" bloqueado(s)"):"";
      fonte(true,"Preços ao vivo · "+d.itens.length+" itens"+ex);
    } else fonte(false,"Sem itens — usando exemplos");
    render();
  };
  var s=document.createElement("script");
  s.src=CONFIG.URL+(CONFIG.URL.indexOf("?")>=0?"&":"?")+"callback="+cb;
  s.onerror=function(){ if(!done){done=true; fonte(false,"Sem conexão — modo demonstração"); gate();} limpar(s); };
  document.body.appendChild(s);
  setTimeout(function(){ if(!done){done=true; fonte(false,"Sem resposta — modo demonstração"); gate();} limpar(s); },8000);
}

/* ---------- dados por contexto ---------- */
function temDadosPasta(p){ return (DADOS.itens||[]).some(function(it){return it.linha===p||it.linha==="Ambos";}); }
function temDadosArea(p,a){ return (DADOS.itens||[]).some(function(it){return (it.linha===p||it.linha==="Ambos") && it.area===a;}); }
function itensBase(){ return (DADOS.itens||[]).filter(function(it){return (it.linha===state.pasta||it.linha==="Ambos") && it.area===state.area;}); }
function itensDoPerfil(p){
  return itensBase().filter(function(it){
    if(p==="Cliente especial") return it.perfil==="Cliente especial";
    if(p==="Revenda") return it.perfil==="Revenda";
    return it.perfil==="Produtor" || it.perfil==="Todos";
  });
}
function areaAtiva(){ return temDadosArea(state.pasta,state.area); }

/* ---------- navegação ---------- */
function nivel(){
  if(!state.pasta) return "pasta";
  if(!state.area) return "area";
  if(!areaAtiva()) return "embreve";
  if(state.promo) return "promocoes";
  if(!state.perfil) return "perfil";
  return "busca";
}
function voltar(){
  var n=nivel();
  if(n==="busca"){ state.perfil=null; state.q=""; state.qtd=null; }
  else if(n==="promocoes"){ state.promo=false; }
  else if(n==="perfil"){ state.area=null; }
  else if(n==="embreve"){ state.area=null; }
  else if(n==="area"){ state.pasta=null; }
  render();
}
function trilha(){
  var p=[];
  if(state.pasta) p.push(state.pasta);
  if(state.area) p.push(state.area);
  if(state.perfil) p.push(state.perfil);
  else if(state.promo) p.push("Promoções");
  if(!p.length) return "";
  return p.map(function(x,i){ return i===p.length-1?"<b>"+x+"</b>":x; }).join(" › ");
}

/* ---------- telas ---------- */
function ligarBotoes(lista, cb){
  $("app").querySelectorAll(".opt[data-i]").forEach(function(b){ b.onclick=function(){ cb(lista[Number(b.dataset.i)]); }; });
}
function botao(o, i, ativa, soonTxt){
  var soon=!ativa;
  return '<button class="opt'+(soon?' soon':'')+'" data-i="'+i+'">'+
    '<span class="ic">'+o.ic+'</span>'+
    '<span class="tx"><b>'+o.id+'</b></span>'+
    '<span class="go">'+(soon?(soonTxt||'EM BREVE'):'›')+'</span></button>';
}
function render(){
  var n=nivel(), app=$("app");
  $("nav").classList.toggle("hidden", n==="pasta");
  $("trilha").innerHTML=trilha();
  $("foot").textContent = n==="busca" ? "Preços conforme a lista vigente." : "";

  if(n==="pasta"){
    app.innerHTML='<div class="screen"><h2>Qual lista?</h2><p class="lead">Toque para começar.</p><div class="opts">'+
      PASTAS.map(function(o,i){ return botao(o,i,temDadosPasta(o.id),'em breve'); }).join('')+'</div></div>';
    ligarBotoes(PASTAS,function(o){ state.pasta=o.id; render(); });
    return;
  }
  if(n==="area"){
    var lista=AREAS[state.pasta]||[];
    app.innerHTML='<div class="screen"><h2>'+state.pasta+' — escolha a área</h2>'+
      '<p class="lead">As marcadas "em breve" ainda não têm preços publicados.</p><div class="opts">'+
      lista.map(function(o,i){ return botao(o,i,temDadosArea(state.pasta,o.id)); }).join('')+'</div></div>';
    ligarBotoes(lista,function(o){ state.area=o.id; render(); });
    return;
  }
  if(n==="embreve"){
    app.innerHTML='<div class="embreve"><div class="big">'+state.area+' — em breve</div>Esta área ainda não foi publicada. Use o botão Voltar para escolher outra.</div>';
    return;
  }
  if(n==="perfil"){
    var np=promoGrupos().length;
    var pb='<div class="opts" style="margin-bottom:11px"><button class="opt promo" id="btnPromo">'+
      '<span class="ic">%</span><span class="tx"><b>Promoções</b></span><span class="go">›</span></button></div>';
    var disp=PERFIS.filter(function(o){ return itensDoPerfil(o.id).length>0; });
    app.innerHTML='<div class="screen"><h2>'+state.area+' · '+state.pasta+'</h2><p class="lead">Veja as ofertas ou escolha o tipo de cliente.</p>'+
      pb+'<div class="opts">'+disp.map(function(o,i){return botao(o,i,true);}).join('')+'</div></div>';
    $("btnPromo").onclick=function(){ state.promo=true; render(); };
    ligarBotoes(disp,function(o){ state.perfil=o.id; state.q=""; state.qtd=null; render(); });
    return;
  }
  if(n==="promocoes"){
    var gs=promoGrupos(); var tp=promosTextoArea(); var tot=gs.length+tp.length;
    var h='<div class="screen"><h2>Promoções ativas</h2>';
    if(!tot){ h+='<div class="embreve"><div class="big">Nenhuma promoção ativa agora</div>Quando o gerente publicar uma oferta na planilha, ela aparece aqui sozinha.</div>'; }
    else { h+='<p class="lead">'+tot+' promoção(ões) valendo hoje.</p><div class="list" id="plist"></div>'; }
    app.innerHTML=h+'</div>';
    if(tot) renderPromoCards(gs, tp);
    return;
  }
  // busca
  app.innerHTML=
    '<div class="inputs"><input id="q" placeholder="Buscar produto ou código" autocomplete="off"/>'+
    '<input id="qtd" placeholder="Qtde" inputmode="numeric"/></div>'+
    '<div id="hero"></div><div class="list" id="list"></div>';
  $("q").value=state.q; $("qtd").value=state.qtd||"";
  $("q").oninput=function(e){ state.q=e.target.value; renderResultado(); };
  $("qtd").oninput=function(e){ var v=parseInt(e.target.value,10); state.qtd=isNaN(v)?null:v; renderResultado(); };
  renderResultado();
  $("q").focus();
}

function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function promosTextoArea(){
  return (DADOS.promocoesTexto||[]).filter(function(t){
    return t.area===state.area && (t.linha===state.pasta || t.linha==="Ambos");
  });
}
function promoGrupos(){
  var proms=itensBase().filter(function(it){return it.emPromo;});
  var m={}; proms.forEach(function(it){ var k=it.codigo+"|"+it.perfil; (m[k]=m[k]||[]).push(it); });
  return Object.keys(m).map(function(k){ return m[k].sort(function(a,b){return (a.qtdMin||0)-(b.qtdMin||0);}); });
}
function renderPromoCards(grupos, textos){

      pedido+
      '<div class="ipinote">As informações acima são para a equipe (incluem comissão). Os botões abaixo enviam a versão do cliente, sem comissão.</div>'+

    }).join("");
    var ate=g0.promoFim?('<div class="ipinote">Oferta válida até '+g0.promoFim+'.</div>'):'';

/* ---------- mensagem + resultados ---------- */
function casa(it,qtd){ if(!qtd)return false; return qtd>=it.qtdMin && (it.qtdMax==null||qtd<=it.qtdMax); }
function unidQtd(it,qtd){ return qtd===1 ? it.unidade : plural(it.unidade); }
function msgCliente(grupo,qtd){
  var g0=grupo[0];
  var L=["*"+g0.produto+"*"+(g0.apresentacao?" ("+g0.apresentacao+")":"")];
  var hit=qtd?grupo.find(function(x){return casa(x,qtd);}):null;
  if(hit){ L.push("Para "+qtd+" "+unidQtd(hit,qtd)+": *"+brl(hit.precoVigente)+"*"+(hit.emPromo?" 🔥 PROMO":"")); }
  else { grupo.forEach(function(x){ L.push("• "+rotulo(x)+": "+brl(x.precoVigente)+(x.emPromo?" 🔥 PROMO":"")); }); }
  if(g0.ipi) L.push("*Preço final já com IPI de "+pct(g0.ipi)+" incluído.");
  if(g0.tipo!=="Acessório" && g0.obs) L.push(g0.obs);
  var pr=grupo.find(function(x){return x.emPromo;});
  if(pr && pr.promoFim) L.push("🔥 Promoção válida até "+pr.promoFim+".");
  L.push("");
  L.push("Válido até "+(g0.validade||"a data da lista vigente")+" ou enquanto durar o estoque.");
  L.push(PARCELAMENTO);
  return L.join("\n");
}
function copiar(t){ if(navigator.clipboard){ navigator.clipboard.writeText(t).then(function(){toast("Copiado");}, function(){fallbackCopy(t);}); } else fallbackCopy(t); }
function fallbackCopy(t){ var a=document.createElement("textarea");a.value=t;document.body.appendChild(a);a.select();try{document.execCommand("copy");toast("Copiado");}catch(e){}a.remove(); }
function whats(t){ window.open("https://wa.me/?text="+encodeURIComponent(t),"_blank","noopener"); }
function toast(t){ var el=$("toast");el.textContent=t;el.classList.add("on");setTimeout(function(){el.classList.remove("on");},1500); }

function agrupar(arr){
  var m={}; arr.forEach(function(it){ (m[it.codigo]=m[it.codigo]||[]).push(it); });
  var gs=Object.keys(m).map(function(k){ return m[k].slice().sort(function(a,b){return (a.qtdMin||0)-(b.qtdMin||0);}); });
  gs.sort(function(a,b){ return String(a[0].produto||'').localeCompare(String(b[0].produto||''),'pt-BR'); });
  return gs;
}
function renderResultado(){
  if(nivel()!=="busca") return;
  var grupos=agrupar(itensDoPerfil(state.perfil));
  var q=norm(state.q);
  if(q){ grupos=grupos.filter(function(g){ var t=norm(g[0].produto+" "+g[0].codigo); return q.split(/\s+/).every(function(w){return t.indexOf(w)>=0;}); }); }
  var qtd=state.qtd;

  var hero=$("hero"); hero.innerHTML="";
  if(qtd){
    var cand=null;
    grupos.some(function(g){ var h=g.find(function(x){return casa(x,qtd);}); if(h){cand={g:g,h:h};return true;} return false; });
    if(cand){
      var h=cand.h;
      hero.innerHTML='<div class="hero"><div class="lb">Preço para '+qtd+' '+unidQtd(h,qtd)+'</div>'+
        '<div class="pr"><div class="nm">'+h.produto+(h.apresentacao?" · "+h.apresentacao:"")+(h.emPromo?' <span class="badge">promo</span>':'')+'</div>'+
        '<div class="vl">'+brl(h.precoVigente)+'</div></div>'+
        '<div class="fx">'+(h.tipo==="Acessório"?"Preço por unidade":"Faixa "+h.faixa)+'</div>'+
        (h.ipi?'<div class="ipi">Inclui IPI de '+pct(h.ipi)+'</div>':'')+
        '<div class="acts"><button class="btn copy" id="hc">Copiar preço</button><button class="btn wa" id="hw">Enviar no WhatsApp</button></div></div>';
      $("hc").onclick=function(){copiar(msgCliente(cand.g,qtd));};
      $("hw").onclick=function(){whats(msgCliente(cand.g,qtd));};
    }
  }
  var list=$("list"); list.innerHTML="";
  if(!grupos.length){ list.innerHTML='<div class="empty">Nada encontrado. Tente outro nome ou código, ou limpe a busca.</div>'; return; }
  grupos.forEach(function(g){
    var g0=g[0], promo=g.some(function(x){return x.emPromo;});
    var faixas=g.map(function(x){
      var hit=casa(x,qtd)?"hit":"";
      return '<li class="'+hit+'"><span>'+rotulo(x)+(x.emPromo?' 🔥':'')+'</span><span class="vl">'+brl(x.precoVigente)+'</span></li>';
    }).join("");
    var card=document.createElement("article"); card.className="card";
    card.innerHTML='<h3>'+g0.produto+(promo?' <span class="badge">promo</span>':'')+'</h3>'+
      '<div class="cod">Cód. '+g0.codigo+(g0.apresentacao?' · '+g0.apresentacao:'')+'</div>'+
      '<ul class="faixas">'+faixas+'</ul>'+
      (g0.ipi?'<div class="ipinote">* Preço final já com IPI de '+pct(g0.ipi)+' incluído.</div>':'')+
      (g0.obs?'<div class="obs">'+g0.obs+'</div>':'')+
      '<div class="acts"><button class="btn copy">Copiar</button><button class="btn wa">WhatsApp</button></div>';
    var b=card.querySelectorAll(".btn");
    b[0].onclick=function(){copiar(msgCliente(g,qtd));};
    b[1].onclick=function(){whats(msgCliente(g,qtd));};
    list.appendChild(card);
  });
}

$("voltar").onclick=voltar;
function gate(){
  var senha=(DADOS.config&&DADOS.config.senha!=null)?String(DADOS.config.senha).trim():"";
  var ov=$("senhaGate");
  if(!senha){ ov.classList.add("hidden"); return; }
  var stored=null; try{stored=localStorage.getItem("alta_unlocked");}catch(e){}
  if(stored===senha){ ov.classList.add("hidden"); return; }
  ov.classList.remove("hidden");
}
function tentarSenha(){
  var senha=(DADOS.config&&DADOS.config.senha!=null)?String(DADOS.config.senha).trim():"";
  var val=$("senhaInput").value.trim();
  if(senha && val===senha){ try{localStorage.setItem("alta_unlocked",senha);}catch(e){} $("senhaGate").classList.add("hidden"); $("senhaErro").classList.add("hidden"); }
  else { $("senhaErro").classList.remove("hidden"); $("senhaInput").select(); }
}
$("senhaBtn").onclick=tentarSenha;
$("senhaInput").onkeydown=function(e){ if(e.key==="Enter") tentarSenha(); };

(function(){ try{ if(!localStorage.getItem("alta_unlocked")) $("senhaGate").classList.remove("hidden"); }catch(e){ $("senhaGate").classList.remove("hidden"); } })();
render();
carregar();
