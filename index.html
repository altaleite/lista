<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Neonatos · Leite — Preços</title>
<style>
:root{
  --azul:#003C88; --azul2:#0057A8; --cyan:#00A3D7; --tinta:#0B1B33;
  --bg:#F1F5FA; --papel:#fff; --linha:#E1E9F3; --muted:#5A6B82;
  --verde:#0A7B4F; --promo:#C2410C; --sombra:0 10px 30px rgba(0,40,95,.10);
  --r:16px;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--tinta);
  font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;-webkit-text-size-adjust:100%}
button,input{font:inherit;color:inherit}
.wrap{max-width:680px;margin:0 auto;padding:0 14px 96px}

/* topo */
.top{position:sticky;top:0;z-index:30;margin:0 -14px;
  background:linear-gradient(135deg,#002A66,#0057A8 60%,#00A3D7);color:#fff}
.top-in{max-width:680px;margin:0 auto;padding:12px 14px}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;border-radius:9px;background:#fff;color:var(--azul);
  font-weight:900;display:grid;place-items:center;letter-spacing:-.06em;font-size:15px}
.brand h1{font-size:16px;margin:0;font-weight:800;letter-spacing:-.02em}
.brand .sub{font-size:11px;opacity:.85;margin-top:1px}
.src{font-size:11px;margin-top:8px;opacity:.9;display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:#8CE0B0;display:inline-block}
.dot.demo{background:#FFD27A}

/* gate de perfil */
.gate{padding:22px 2px 6px}
.gate h2{font-size:19px;margin:0 0 4px;letter-spacing:-.02em}
.gate p{margin:0 0 16px;color:var(--muted);font-size:13px}
.perfis{display:grid;gap:11px}
.perfil{display:flex;align-items:center;gap:14px;width:100%;text-align:left;cursor:pointer;
  background:var(--papel);border:1.5px solid var(--linha);border-radius:var(--r);
  padding:17px 16px;box-shadow:var(--sombra);transition:transform .06s,border-color .12s}
.perfil:active{transform:scale(.99)}
.perfil:hover{border-color:var(--cyan)}
.perfil .ic{width:44px;height:44px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;
  background:#EAF2FB;color:var(--azul);font-weight:900;font-size:18px}
.perfil .tx b{display:block;font-size:16px;letter-spacing:-.01em}
.perfil .tx span{display:block;font-size:12px;color:var(--muted);margin-top:2px}
.perfil .go{margin-left:auto;color:var(--cyan);font-size:22px;font-weight:700}

/* barra de perfil ativo + busca */
.bar{position:sticky;top:64px;z-index:20;margin:0 -14px;padding:10px 14px;
  background:rgba(241,245,250,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--linha)}
.chip{display:inline-flex;align-items:center;gap:8px;background:var(--azul);color:#fff;
  border-radius:999px;padding:6px 12px;font-size:13px;font-weight:700}
.chip button{background:rgba(255,255,255,.22);border:0;color:#fff;border-radius:999px;
  padding:3px 9px;font-size:11px;font-weight:700;cursor:pointer;margin-left:2px}
.inputs{display:grid;grid-template-columns:1fr 108px;gap:8px;margin-top:9px}
.inputs input{background:#fff;border:1.5px solid var(--linha);border-radius:12px;
  padding:0 13px;min-height:48px;font-size:16px;font-weight:600;outline:none;width:100%}
.inputs input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,163,215,.14)}
.inputs input::placeholder{color:#94A6BD;font-weight:500}

/* hero preço identificado */
.hero{background:linear-gradient(135deg,#003C88,#0069B8);color:#fff;border-radius:var(--r);
  padding:15px 16px;margin:14px 0 4px;box-shadow:var(--sombra)}
.hero .lb{font-size:11px;text-transform:uppercase;letter-spacing:.08em;opacity:.85}
.hero .pr{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-top:3px}
.hero .pr .nm{font-size:16px;font-weight:800;line-height:1.15}
.hero .pr .vl{font-size:26px;font-weight:900;letter-spacing:-.02em;white-space:nowrap}
.hero .fx{font-size:12px;opacity:.9;margin-top:3px}
.hero .acts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:13px}

/* cards */
.list{margin-top:14px;display:grid;gap:12px}
.card{background:var(--papel);border:1px solid var(--linha);border-radius:var(--r);
  padding:14px;box-shadow:var(--sombra)}
.card h3{margin:0;font-size:16px;letter-spacing:-.01em}
.card .cod{font-size:11.5px;color:var(--muted);margin-top:2px}
.badge{display:inline-block;background:#FEF0E6;color:var(--promo);font-size:10.5px;font-weight:800;
  border-radius:6px;padding:2px 7px;margin-left:6px;vertical-align:middle;text-transform:uppercase;letter-spacing:.03em}
.faixas{list-style:none;margin:11px 0 0;padding:0;border-top:1px dashed var(--linha)}
.faixas li{display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:8px 2px;border-bottom:1px solid #F0F4F9;font-size:14px}
.faixas li:last-child{border-bottom:0}
.faixas .rg{color:var(--tinta)}
.faixas .vl{font-weight:800;white-space:nowrap}
.faixas li.hit{background:#EAF7F0;margin:0 -6px;padding-left:8px;padding-right:8px;border-radius:8px}
.faixas li.hit .vl{color:var(--verde)}
.obs{font-size:11.5px;color:var(--muted);margin-top:9px;line-height:1.35}
.acts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}
.btn{border:0;border-radius:12px;min-height:46px;font-weight:800;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;transition:filter .1s}
.btn:active{filter:brightness(.94)}
.btn.copy{background:#EAF2FB;color:var(--azul)}
.btn.wa{background:#1FA855;color:#fff}
.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}

.foot{text-align:center;color:#9AABC0;font-size:11px;margin-top:22px;line-height:1.5}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);
  background:var(--tinta);color:#fff;padding:11px 18px;border-radius:999px;font-size:13px;font-weight:700;
  opacity:0;pointer-events:none;transition:.2s;z-index:50}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.hidden{display:none!important}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="top"><div class="top-in">
  <div class="brand">
    <div class="logo">A</div>
    <div><h1>Neonatos · Leite</h1><div class="sub">Consulta rápida de preços</div></div>
  </div>
  <div class="src" id="src"><span class="dot" id="dot"></span><span id="srcTxt">Carregando…</span></div>
</div></div>

<div class="wrap">
  <!-- Passo 1: perfil -->
  <section class="gate" id="gate">
    <h2>Para quem é a venda?</h2>
    <p>Toque no tipo de cliente. O preço muda conforme o perfil.</p>
    <div class="perfis" id="perfis"></div>
  </section>

  <!-- Passo 2: busca -->
  <div class="bar hidden" id="bar">
    <span class="chip">Cliente: <b id="chipTxt"></b><button id="trocar">trocar</button></span>
    <div class="inputs">
      <input id="q" placeholder="Buscar produto ou código" autocomplete="off"/>
      <input id="qtd" placeholder="Qtde" inputmode="numeric"/>
    </div>
  </div>
  <div id="hero"></div>
  <div class="list" id="list"></div>

  <div class="foot" id="foot"></div>
</div>
<div class="toast" id="toast"></div>

function brl(v){ if(v==null||v==="")return "—"; return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"}); }
function norm(s){ return String(s==null?"":s).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }

function carregar(){
  if(!CONFIG.URL){ fonte(false,"Modo demonstração — dados de exemplo"); montarPerfis(); return; }
  fonte(true,"Conectando…");
  var cb="__neoCB_"+Date.now();
  var done=false;
  var limpar=function(s){ try{delete window[cb];}catch(e){window[cb]=undefined;} if(s&&s.parentNode)s.parentNode.removeChild(s); };
  window[cb]=function(d){
    done=true;
    if(d && d.itens && d.itens.length){
      DADOS=d;
      var extra=d.bloqueadosPorDivergencia?(" · "+d.bloqueadosPorDivergencia+" bloqueado(s)"):"";

    montarPerfis();
    if(state.perfil) render();
  };
  var s=document.createElement("script");
  s.src=CONFIG.URL+(CONFIG.URL.indexOf("?")>=0?"&":"?")+"callback="+cb;
  s.onerror=function(){ if(!done){ done=true; DADOS=EMBEDDED; fonte(false,"Sem conexão — modo demonstração"); montarPerfis(); if(state.perfil) render(); } limpar(s); };
  document.body.appendChild(s);
  setTimeout(function(){ if(!done){ done=true; fonte(false,"Sem resposta — modo demonstração"); if(state.perfil) render(); } limpar(s); },8000);
}

function fonte(vivo,txt){ $("dot").className = "dot"+(vivo?"":" demo"); $("srcTxt").textContent = txt; }

function itensDoPerfil(){
  var p = state.perfil;
  return (DADOS.itens||[]).filter(function(it){
    if(it.perfil===p) return true;
    if(p!=="Revenda" && it.perfil==="Todos") return true; // acessórios p/ produtor e especial
    return false;
  });
}
function agrupar(arr){
  var m={};
  arr.forEach(function(it){ (m[it.codigo]=m[it.codigo]||[]).push(it); });
  return Object.keys(m).map(function(k){
    return m[k].slice().sort(function(a,b){return (a.qtdMin||0)-(b.qtdMin||0);});
  });
}
function casa(it,qtd){ if(!qtd) return false; return qtd>=it.qtdMin && (it.qtdMax==null || qtd<=it.qtdMax); }

function msgCliente(grupo,qtd){
  var g0=grupo[0];
  var nome="*"+g0.produto+"*"+(g0.apresentacao?" ("+g0.apresentacao+")":"");
  var corpo="";
  var hit = qtd ? grupo.find(function(x){return casa(x,qtd);}) : null;
  if(hit){
    corpo="Para "+qtd+" "+hit.unidade+": *"+brl(hit.precoVigente)+"*"+(hit.emPromo?" 🔥 PROMO":"")+"  (faixa "+hit.faixa+")";
  } else {
    corpo=grupo.map(function(x){
      return "• "+x.faixa+" "+x.unidade+": "+brl(x.precoVigente)+(x.emPromo?" 🔥 PROMO":"");
    }).join("\n");
  }
  var linhas=[nome,corpo];
  if(g0.obs) linhas.push(g0.obs);
  linhas.push("");
  linhas.push("Válido até "+(g0.validade||"a data da lista vigente")+" ou enquanto durar o estoque.");
  linhas.push(PARCELAMENTO);
  return linhas.join("\n");
}
function copiar(t){
  if(navigator.clipboard){ navigator.clipboard.writeText(t).then(function(){toast("Copiado");},fallbackCopy.bind(null,t)); }
  else fallbackCopy(t);
}
function fallbackCopy(t){ var a=document.createElement("textarea");a.value=t;document.body.appendChild(a);a.select();try{document.execCommand("copy");toast("Copiado");}catch(e){}a.remove(); }
function whats(t){ window.open("https://wa.me/?text="+encodeURIComponent(t),"_blank","noopener"); }
function toast(t){ var el=$("toast");el.textContent=t;el.classList.add("on");setTimeout(function(){el.classList.remove("on");},1500); }

function montarPerfis(){
  var wrap=$("perfis"); wrap.innerHTML="";
  var disponiveis = ORDEM_PERFIL.filter(function(p){
    return (DADOS.itens||[]).some(function(it){return it.perfil===p;});
  });
  disponiveis.forEach(function(p){
    var info=PERFIL_INFO[p]||{ic:"•",desc:""};
    var b=document.createElement("button");
    b.className="perfil";
    b.innerHTML='<span class="ic">'+info.ic+'</span><span class="tx"><b>'+p+'</b><span>'+info.desc+'</span></span><span class="go">›</span>';
    b.onclick=function(){ escolherPerfil(p); };
    wrap.appendChild(b);
  });
  $("foot").textContent = "Preços sujeitos às regras de cada lista. Fonte: base Neonatos · Leite.";
}
function escolherPerfil(p){
  state.perfil=p; state.q=""; state.qtd=null;
  $("chipTxt").textContent=p;
  $("gate").classList.add("hidden");
  $("bar").classList.remove("hidden");
  $("q").value=""; $("qtd").value="";
  render(); $("q").focus();
}
function voltar(){
  state.perfil=null;
  $("bar").classList.add("hidden");
  $("hero").innerHTML=""; $("list").innerHTML="";
  $("gate").classList.remove("hidden");
  window.scrollTo({top:0,behavior:"smooth"});
}
function render(){
  var grupos=agrupar(itensDoPerfil());
  var q=norm(state.q);
  if(q){ grupos=grupos.filter(function(g){ var t=norm(g[0].produto+" "+g[0].codigo); return q.split(/\s+/).every(function(w){return t.indexOf(w)>=0;}); }); }
  var qtd=state.qtd;

  // hero: preço identificado
  var hero=$("hero"); hero.innerHTML="";
  if(qtd){
    var candidatos=[];
    grupos.forEach(function(g){ var h=g.find(function(x){return casa(x,qtd);}); if(h) candidatos.push({g:g,h:h}); });
    if(candidatos.length){
      var c=candidatos[0];
      hero.innerHTML='<div class="hero"><div class="lb">Preço para '+qtd+' '+c.h.unidade+'</div>'+
        '<div class="pr"><div class="nm">'+c.h.produto+(c.h.apresentacao?" · "+c.h.apresentacao:"")+(c.h.emPromo?' <span class="badge">promo</span>':'')+'</div>'+
        '<div class="vl">'+brl(c.h.precoVigente)+'</div></div>'+
        '<div class="fx">Faixa '+c.h.faixa+'</div>'+
        '<div class="acts"><button class="btn copy" id="hc">Copiar preço</button><button class="btn wa" id="hw">Enviar no WhatsApp</button></div></div>';
      $("hc").onclick=function(){copiar(msgCliente(c.g,qtd));};
      $("hw").onclick=function(){whats(msgCliente(c.g,qtd));};
    }
  }

  // lista de cards
  var list=$("list"); list.innerHTML="";
  if(!grupos.length){ list.innerHTML='<div class="empty">Nada encontrado. Tente outro nome ou código, ou limpe a busca.</div>'; return; }
  grupos.forEach(function(g){
    var g0=g[0], promo=g.some(function(x){return x.emPromo;});
    var faixasHtml=g.map(function(x){
      var hit=casa(x,qtd)?" hit":"";
      return '<li class="'+ (hit?"hit":"") +'"><span class="rg">'+x.faixa+' '+x.unidade+(x.emPromo?' 🔥':'')+'</span><span class="vl">'+brl(x.precoVigente)+'</span></li>';
    }).join("");
    var card=document.createElement("article");
    card.className="card";
    card.innerHTML='<h3>'+g0.produto+(promo?' <span class="badge">promo</span>':'')+'</h3>'+
      '<div class="cod">Cód. '+g0.codigo+(g0.apresentacao?' · '+g0.apresentacao:'')+'</div>'+
      '<ul class="faixas">'+faixasHtml+'</ul>'+
      (g0.obs?'<div class="obs">'+g0.obs+'</div>':'')+
      '<div class="acts"><button class="btn copy">Copiar</button><button class="btn wa">WhatsApp</button></div>';
    var btns=card.querySelectorAll(".btn");
    btns[0].onclick=function(){copiar(msgCliente(g,qtd));};
    btns[1].onclick=function(){whats(msgCliente(g,qtd));};
    list.appendChild(card);
  });
}

$("q").oninput=function(e){state.q=e.target.value;render();};
$("qtd").oninput=function(e){var n=parseInt(e.target.value,10);state.qtd=isNaN(n)?null:n;render();};
$("trocar").onclick=voltar;
// A tela aparece na hora com os dados embutidos; a leitura ao vivo entra por trás.
DADOS=EMBEDDED;
montarPerfis();
carregar();
</script>
</body>
</html>
